name: Update latest writing (Substack)

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC (weekly)
  workflow_dispatch: {}

concurrency:
  group: latest-writing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch feed and update README
        env:
          FEED_URL: "https://substack-feed-proxy.danieladeniji001.workers.dev/"
        run: |
          python - << 'PY'
          import re, sys
          import datetime
          import xml.etree.ElementTree as ET
          from urllib.request import urlopen, Request
          import os

          FEED = os.environ["FEED_URL"]
          START = "<!-- LATEST_SUBSTACK:START -->"
          END = "<!-- LATEST_SUBSTACK:END -->"
          MAX_ITEMS = 4

          req = Request(
            FEED,
            headers={
              "User-Agent": "Mozilla/5.0",
              "Accept": "application/rss+xml,application/xml;q=0.9,*/*;q=0.8",
            },
          )

          xml = urlopen(req, timeout=25).read()
          root = ET.fromstring(xml)
          channel = root.find("channel")
          if channel is None:
            raise RuntimeError("Invalid RSS: missing <channel>")

          items = channel.findall("item")[:MAX_ITEMS]

          rows = []
          for it in items:
            title = (it.findtext("title") or "").strip().replace("|", "\\|")
            link = (it.findtext("link") or "").strip()
            pub = (it.findtext("pubDate") or "").strip()

            date = ""
            try:
              date = datetime.datetime.strptime(pub, "%a, %d %b %Y %H:%M:%S %Z").date().isoformat()
            except Exception:
              date = pub[:16] if pub else ""

            # Cleaner table: title is the link
            rows.append(f"| [{title}]({link}) | {date} |")

          if not rows:
            rows.append("| (no posts found) |  |")

          table = "\n".join([
            "| Latest writing | Date |",
            "|---|---:|",
            *rows,
          ])

          with open("README.md", "r", encoding="utf-8") as f:
            readme = f.read()

          pattern = re.compile(re.escape(START) + r".*?" + re.escape(END), re.S)
          if not pattern.search(readme):
            raise RuntimeError("Could not find LATEST_SUBSTACK markers in README.md")

          new = pattern.sub(START + "\n" + table + "\n" + END, readme)

          if new == readme:
            print("No changes needed.")
            sys.exit(0)

          with open("README.md", "w", encoding="utf-8") as f:
            f.write(new)

          print("README updated.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: update latest writing"
          git push
